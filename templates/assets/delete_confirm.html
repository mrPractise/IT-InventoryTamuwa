{% extends 'base.html' %}

{% block page_title %}Delete Asset{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header bg-danger text-white">
        <i class="bi bi-exclamation-triangle"></i> Confirm Delete
    </div>
    <div class="card-body">
        <p>Are you sure you want to delete asset <strong>{{ asset.asset_id }}</strong>?</p>
        <p class="text-muted">This action will soft-delete the asset. It can be restored from the admin panel.</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Delete
            </button>
            <a href="{% url 'assets:detail' asset.pk %}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
