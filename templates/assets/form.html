{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-{% if asset %}pencil{% else %}plus-circle{% endif %}"></i> {{ title }}</span>
        <a href="{% if asset %}{% url 'assets:detail' asset.pk %}{% else %}{% url 'assets:list' %}{% endif %}" class="btn btn-sm btn-light">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% if asset %}{% url 'assets:detail' asset.pk %}{% else %}{% url 'assets:list' %}{% endif %}"
                    class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
                <button type="button" class="btn btn-outline-warning" onclick="clearFormData(this)">
                    <i class="bi bi-trash"></i> Clear Saved Data
                </button>
            </div>
        </form>
    </div>
</div>

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function () {
        const categorySelect = document.getElementById('id_category');
        const assetIdInput = document.getElementById('id_asset_id');

        if (categorySelect && assetIdInput) {
            categorySelect.addEventListener('change', function () {
                const categoryId = this.value;
                if (categoryId) {
                    fetch(`/assets/api/get-next-asset-id/?category_id=${categoryId}`)
                        .then(response => response.json())
                        .then(data => {
                            if (data.asset_id) {
                                assetIdInput.value = data.asset_id;
                            }
                        })
                        .catch(error => console.error('Error fetching asset ID:', error));
                } else {
                    assetIdInput.value = '';
                }
            });
        }
    });
    
    // Clear form data function
    function clearFormData(button) {
        const form = button.closest('form');
        if (form && typeof FormPersistence !== 'undefined') {
            FormPersistence.clearForm(form);
            // Clear form fields
            form.reset();
            // Show confirmation
            button.innerHTML = '<i class="bi bi-check"></i> Cleared!';
            setTimeout(() => {
                button.innerHTML = '<i class="bi bi-trash"></i> Clear Saved Data';
            }, 2000);
        }
    }
</script>
{% endblock %}
{% endblock %}
