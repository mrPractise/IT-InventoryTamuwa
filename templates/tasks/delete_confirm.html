{% extends 'base.html' %}

{% block page_title %}Delete Task{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <i class="bi bi-exclamation-triangle text-danger"></i> Confirm Deletion
    </div>
    <div class="card-body">
        <p>Are you sure you want to delete the task <strong>"{{ task.title }}"</strong>?</p>
        <p class="text-muted">This action cannot be undone.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash"></i> Yes, Delete
            </button>
            <a href="{% url 'tasks:detail' task.pk %}" class="btn btn-secondary">
                <i class="bi bi-x-circle"></i> Cancel
            </a>
        </form>
    </div>
</div>
{% endblock %}
