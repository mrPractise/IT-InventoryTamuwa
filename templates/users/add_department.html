{% extends 'base.html' %}

{% block page_title %}Add Department{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h5 class="mb-0"><i class="bi bi-building-add me-2"></i>Add Department</h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label class="form-label">Department Name</label>
                        {{ form.name }}
                        {{ form.name.errors }}
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{% url 'users:directory' %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Create Department</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
