<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - IT Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #3c3c3c;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-card {
            background: #2a2a2a;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 50px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            border: 1px solid #4e4e4e;
        }
        .logout-icon {
            font-size: 4rem;
            color: #28a745;
            margin-bottom: 20px;
        }
        .logout-brand {
            margin-bottom: 30px;
        }
        .logout-brand i {
            font-size: 2.5rem;
            color: #adb5bd;
        }
        .logout-brand h3 {
            color: #ffffff;
        }
        .logout-card h4 {
            color: #ffffff;
        }
        .logout-card p {
            color: #c8c8c8;
        }
        .btn-login {
            background: #555555;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            color: #ffffff;
        }
        .btn-login:hover {
            background: #4e4e4e;
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="logout-card">
        <div class="logout-brand">
            <i class="bi bi-box-seam"></i>
            <h3 class="mt-2">IT Inventory</h3>
        </div>
        
        <div class="logout-icon">
            <i class="bi bi-check-circle-fill"></i>
        </div>
        
        <h4 class="mb-3">You have been logged out</h4>
        <p class="text-muted mb-4">Thank you for using IT Inventory. Have a great day!</p>
        
        <a href="{% url 'users:login' %}" class="btn btn-primary btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login Again
        </a>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
