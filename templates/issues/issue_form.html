{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-bug me-2"></i>{{ title }}</span>
        <a href="{% if issue %}{% url 'issues:issue_detail' issue.pk %}{% else %}{% url 'issues:home' %}?tab=issues{% endif %}" class="btn btn-sm btn-light">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i>Save</button>
                <a href="{% if issue %}{% url 'issues:issue_detail' issue.pk %}{% else %}{% url 'issues:home' %}?tab=issues{% endif %}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
