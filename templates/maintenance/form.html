{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-{% if log %}pencil{% else %}plus-circle{% endif %}"></i> {{ title }}</span>
        <a href="{% if log %}{% url 'maintenance:detail' log.pk %}{% else %}{% url 'maintenance:list' %}{% endif %}" class="btn btn-sm btn-light">
            <i class="bi bi-arrow-left me-1"></i>Back
        </a>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i> Save
                </button>
                <a href="{% if log %}{% url 'maintenance:detail' log.pk %}{% else %}{% url 'maintenance:list' %}{% endif %}"
                    class="btn btn-secondary">
                    <i class="bi bi-x-circle"></i> Cancel
                </a>
                <button type="button" class="btn btn-outline-warning" onclick="clearFormData(this)">
                    <i class="bi bi-trash"></i> Clear Saved Data
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function clearFormData(button) {
        const form = button.closest('form');
        if (form && typeof FormPersistence !== 'undefined') {
            FormPersistence.clearForm(form);
            form.reset();
            button.innerHTML = '<i class="bi bi-check"></i> Cleared!';
            setTimeout(() => {
                button.innerHTML = '<i class="bi bi-trash"></i> Clear Saved Data';
            }, 2000);
        }
    }
</script>
{% endblock %}
