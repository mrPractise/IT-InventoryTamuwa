{% extends 'base.html' %}

{% block title %}Access Denied - IT Inventory{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm border-warning">
                <div class="card-body py-5">
                    <i class="bi bi-shield-exclamation display-1 text-warning"></i>
                    <h1 class="display-4 mt-4">403</h1>
                    <h3 class="text-warning">Access Denied</h3>
                    <p class="lead mt-3">You don't have permission to access this page.</p>
                    <p class="text-muted">Contact your administrator if you believe this is an error.</p>
                    <a href="{% url 'dashboard:home' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-house-door"></i> Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
