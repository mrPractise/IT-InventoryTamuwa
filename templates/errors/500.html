{% extends 'base.html' %}

{% block title %}Server Error - IT Inventory{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm border-danger">
                <div class="card-body py-5">
                    <i class="bi bi-exclamation-triangle display-1 text-danger"></i>
                    <h1 class="display-4 mt-4">500</h1>
                    <h3 class="text-danger">Server Error</h3>
                    <p class="lead mt-3">Something went wrong on our end. Please try again later.</p>
                    <p class="text-muted">If the problem persists, contact your system administrator.</p>
                    <a href="{% url 'dashboard:home' %}" class="btn btn-primary mt-3">
                        <i class="bi bi-house-door"></i> Go Home
                    </a>
                    <button onclick="location.reload()" class="btn btn-outline-secondary mt-3 ms-2">
                        <i class="bi bi-arrow-clockwise"></i> Retry
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
