<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>503 – Service Unavailable | ICTcore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .error-card { background: white; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.12); padding: 56px 48px; max-width: 500px; width: 100%; text-align: center; }
        .error-code { font-size: 6rem; font-weight: 800; color: #dee2e6; line-height: 1; }
        .error-icon { font-size: 3rem; color: #6c757d; margin-bottom: .5rem; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">503</div>
        <i class="bi bi-cloud-slash error-icon d-block mt-2"></i>
        <h2 class="fw-bold mt-3 mb-2">Service Unavailable</h2>
        <p class="text-muted mb-4">The service is temporarily down for maintenance or is overloaded.</p>
        <p class="text-muted small mb-4">Please check back shortly.</p>
        <div class="d-flex gap-2 justify-content-center">
            <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i>Go Home</a>
            <button onclick="location.reload()" class="btn btn-outline-secondary"><i class="bi bi-arrow-clockwise me-1"></i>Retry</button>
        </div>
        <hr class="my-4">
        <small class="text-muted"><i class="bi bi-box-seam me-1"></i>ICTcore — Inventory Management System</small>
    </div>
</body>
</html>
