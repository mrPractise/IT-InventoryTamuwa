version: '3.9'

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-inventory_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inventory_network

  web:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DB_HOST=db
    expose:
      - "8000"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inventory_network

  nginx:
    build: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - media_files:/app/media
      - static_files:/app/staticfiles
    depends_on:
      - web
    networks:
      - inventory_network

volumes:
  postgres_data:
  media_files:
  static_files:

networks:
  inventory_network:
    driver: bridge
